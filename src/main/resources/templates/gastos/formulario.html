<!DOCTYPE html>
<html lang="es"
xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head"></head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h2 class="mb-4">

        Registrar gasto

    </h2>

    <form
            th:action="@{/gastos}"
            th:object="${gasto}"
            method="post">

            <input
        type="hidden"
        th:field="*{id}">

        <div class="mb-3">

            <label class="form-label">

                Monto

            </label>

            <input
                    class="form-control"
                    type="number"
                    step="0.01"
                    th:field="*{monto}"
                    required>

        </div>

        <div class="mb-3">

            <label class="form-label">

                Fecha

            </label>

            <input
                    class="form-control"
                    type="date"
                    th:field="*{fecha}"
                    required>

        </div>

        <div class="mb-3">

            <label class="form-label">

                Origen

            </label>

            <select
                    class="form-select"
                    th:field="*{origen}">

                <option value="">Seleccione</option>

                <option value="Manual">Manual</option>

                <option value="Pago">Pago</option>

                <option value="Obligación">Obligación</option>

            </select>

        </div>

        <div class="mb-4">

            <label class="form-label">

                Descripción

            </label>

            <textarea
                    class="form-control"
                    rows="4"
                    th:field="*{descripcion}">

            </textarea>

        </div>

        <button
                class="btn btn-primary"
                type="submit">

            Guardar

        </button>

        <a
                class="btn btn-secondary"
                th:href="@{/gastos}">

            Cancelar

        </a>

    </form>

</div>

<div th:replace="fragments/footer :: footer"></div>

</body>

</html>
