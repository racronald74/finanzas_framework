<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head"></head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>Gestión de gastos</h2>

        <a
                class="btn btn-primary"
                th:href="@{/gastos/nuevo}">

            Nuevo gasto

        </a>

    </div>

    <table class="table table-striped table-hover">

        <thead>

        <tr>

            <th>ID</th>

            <th>Fecha</th>

            <th>Monto</th>

            <th>Origen</th>

            <th>Descripción</th>

            <th>Acciones</th>

        </tr>

        </thead>

        <tbody>

        <tr th:if="${#lists.isEmpty(gastos)}">

            <td colspan="6" class="text-center">

                No existen gastos registrados.

            </td>

        </tr>

        <tr th:each="gasto : ${gastos}">

            <td th:text="${gasto.id}"></td>

            <td th:text="${gasto.fecha}"></td>

            <td th:text="${gasto.monto}"></td>

            <td th:text="${gasto.origen}"></td>

            <td th:text="${gasto.descripcion}"></td>

            <td>

                <a
                        class="btn btn-sm btn-warning"
                        th:href="@{/gastos/editar/{id}(id=${gasto.id})}">

                    Editar

                </a>

                <a
        class="btn btn-sm btn-danger"
        href="#"
        th:data-url="@{/gastos/eliminar/{id}(id=${gasto.id})}"
        onclick="confirmarEliminacion(this)">

    Eliminar

</a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

<div th:replace="fragments/footer :: footer"></div>

<div th:replace="fragments/footer :: scripts"></div>

<script>

function confirmarEliminacion(boton) {

    const url = boton.dataset.url;

    Swal.fire({

        title: '¿Eliminar gasto?',

        text: 'Esta acción no se puede deshacer.',

        icon: 'warning',

        showCancelButton: true,

        confirmButtonColor: '#d33',

        cancelButtonColor: '#6c757d',

        confirmButtonText: 'Sí, eliminar',

        cancelButtonText: 'Cancelar'

    }).then((result) => {

        if (result.isConfirmed) {

            window.location.href = url;

        }

    });

}

</script>

<script th:inline="javascript">

const mensaje = /*[[${mensajeExito}]]*/ null;

if (mensaje) {

    let titulo = "";

    if (mensaje === "registrado") {
        titulo = "Gasto registrado correctamente";
    }

    if (mensaje === "actualizado") {
        titulo = "Gasto actualizado correctamente";
    }

    if (mensaje === "eliminado") {
        titulo = "Gasto eliminado correctamente";
    }

    Swal.fire({
        icon: "success",
        title: titulo,
        timer: 1800,
        showConfirmButton: false
    });

}

</script>

</body>

</html>
